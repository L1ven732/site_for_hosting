<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <p>Меню:</p>
    <ul>
        <a href="http://127.0.0.1:8000/">Главная</a>
        <a href="http://127.0.0.1:8000/time">Время</a>
        <a href="http://127.0.0.1:8000/calc">Калькулятор</a>
        <a href="http://127.0.0.1:8000/multiply">Таблица умножения</a>
        <a href="http://127.0.0.1:8000/expression">Выражение</a>
        <a href="http://127.0.0.1:8000/history">История выражений</a>
        <a href="http://127.0.0.1:8000/str2words">Разбор строки</a>
        <a href="http://127.0.0.1:8000/str_history">История разборов</a>
    </ul>
    <h1>Your user is {{ user }}</h1>
    <p style="color:red">
        {{ error }}
    </p>
    {% if user.is_authenticated %}
        <a href="http://127.0.0.1:8000/logout">Logout</a>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username">
        <input type="password" name="password">
        <input type="submit" value="Send">
    </form>
</body>
</html>
